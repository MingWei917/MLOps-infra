name: Terraform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    # Tells all 'run' steps to execute inside the terraform folder
    defaults:
      run:
        working-directory: ./terraform 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create KinD Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: mlops-ci

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (PR)
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color

      - name: Terraform Apply (Main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -parallelism=1 -auto-approve 

      # ==========================================
      # CROSS-REPO DAGSHUB SECRET INJECTION & TRIGGER
      # ==========================================
      
      - name: Inject DagsHub Secrets into App Repo
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "Injecting DagsHub infrastructure endpoints into MLOps-customer-churn-app..."
          
          # 1. MLflow Tracking Server (DagsHub Hosted)
          gh secret set MLFLOW_TRACKING_URI -b "https://dagshub.com/MingWei917/MLOps-customer-churn-app.mlflow" --repo MingWei917/MLOps-customer-churn-app
          gh secret set MLFLOW_TRACKING_USERNAME -b "MingWei917" --repo MingWei917/MLOps-customer-churn-app
          gh secret set MLFLOW_TRACKING_PASSWORD -b "${{ secrets.DAGSHUB_TOKEN }}" --repo MingWei917/MLOps-customer-churn-app
          
          # 2. DVC Remote Storage (DagsHub S3-Compatible)
          gh secret set DVC_S3_ENDPOINT_URL -b "https://dagshub.com/MingWei917/MLOps-customer-churn-app.s3" --repo MingWei917/MLOps-customer-churn-app
          gh secret set DAGSHUB_USERNAME -b "MingWei917" --repo MingWei917/MLOps-customer-churn-app
          gh secret set DAGSHUB_TOKEN -b "${{ secrets.DAGSHUB_TOKEN }}" --repo MingWei917/MLOps-customer-churn-app
          
          echo "✅ DagsHub Secrets successfully injected!"

      - name: Trigger App CI/CD Pipeline
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: MingWei917/MLOps-customer-churn-app
          event-type: infra-updated